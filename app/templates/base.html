<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %} {% endblock %} </title>
    <link href='https://fonts.googleapis.com/css?family=Montserrat' rel='stylesheet'>
    <link rel="icon" type="image/x-icon" href=" {{ url_for('static', filename='images/LogoIco2.ico' ) }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css' ) }}">  <!-- Customização padrão para todas as páginas -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/toast.css') }}"> <!-- Mensagens Flash-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    {% block css %} {% endblock %}
</head>
<body>
    <nav> 
        <div class="nav-logo">
            <img src="{{ url_for('static', filename='images/Logo Principal - Sem Fundo - Maior.png' ) }}"> 
        </div>
        
        <div class="nav-links">
            {% if current_user.is_authenticated %}
                <a href=""> HOME </a>
                <a href="{{ url_for('treinos.listar') }}"> TREINOS </a>
                <a href=""> RANKING </a>
                <a href=""> PERFIL </a>
                <form method="POST" action="{{ url_for('auth.logout') }}" class="d-inline">
                    {{ logout_form.hidden_tag() }}

                    <button type="submit" class="nav-auth">SAIR</button>
                </form>
            {% else %}
                <a href="{{ url_for('auth.login') }}" class="nav-auth">ENTRAR</a>
            {% endif %}
        </div>        
    </nav>

    {% block conteudo %} 
    {% endblock %}

    {% block scripts %}{% endblock %}

    {% include 'components/toast.html' %}
</body>
</html>
